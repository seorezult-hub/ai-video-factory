name: Deploy to Beget VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.212.141.8
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            REPO="https://${{ secrets.GH_TOKEN_DEPLOY }}@github.com/seorezult-hub/ai-video-factory.git"

            if [ ! -d /opt/video-service/.git ]; then
              rm -rf /opt/video-service
              git clone "$REPO" /opt/video-service
            else
              cd /opt/video-service
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/video-service

            if [ ! -f .env ]; then
              touch .env
            fi

            echo "=== next.config.ts on disk ==="
            grep -c "api.groq.com" next.config.ts || echo "NOT FOUND"
            grep -c "console.groq.com" next.config.ts || echo "ok - no console.groq"
            echo ""

            echo "=== Searching ENTIRE filesystem for containers with clipgen.ru or ai-video-factory image ==="
            docker ps -a --format "{{.ID}} {{.Names}} {{.Image}}"
            echo ""

            echo "=== Nuke all ai-video-factory containers AND images ==="
            docker ps -a --format "{{.ID}} {{.Image}}" | grep ai-video-factory | awk '{print $1}' | while read cid; do
              docker stop "$cid" 2>/dev/null || true
              docker rm -f "$cid" 2>/dev/null || true
            done
            docker compose down --remove-orphans 2>/dev/null || true

            # Remove ALL cached images of ai-video-factory
            docker images --format "{{.ID}} {{.Repository}}" | grep ai-video-factory | awk '{print $1}' | while read iid; do
              echo "Removing image $iid"
              docker rmi -f "$iid" 2>/dev/null || true
            done

            # Clean builder cache to force full rebuild
            docker builder prune -af 2>/dev/null || true

            echo "=== Building fresh (no cache) ==="
            docker compose build --no-cache app
            docker compose up -d --force-recreate

            sleep 8
            echo ""
            echo "=== Final state ==="
            docker ps --format "{{.ID}} | {{.Names}} | {{.Image}} | {{.Status}}"

            # Sanity check: grep csp from inside the running container
            CID=$(docker ps --filter "name=ai-video-factory" --format "{{.ID}}" | head -1)
            if [ -n "$CID" ]; then
              echo "=== next.config.ts INSIDE container ==="
              docker exec "$CID" sh -c "cat /app/next.config.ts 2>/dev/null || find / -name next.config.ts -not -path '*/node_modules/*' 2>/dev/null | head -3 | xargs -I {} sh -c 'echo FOUND: {}; grep groq {}'"
              echo ""
              echo "=== curl from container to localhost ==="
              docker exec "$CID" sh -c "wget -qO- --header='Host: clipgen.ru' http://localhost:3000/ 2>/dev/null | head -c 500" || true
            fi

            echo "✅ Deployed at $(date)"
