name: Deploy to Beget VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.212.141.8
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            REPO="https://${{ secrets.GH_TOKEN_DEPLOY }}@github.com/seorezult-hub/ai-video-factory.git"

            if [ ! -d /opt/video-service/.git ]; then
              rm -rf /opt/video-service
              git clone "$REPO" /opt/video-service
            else
              cd /opt/video-service
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/video-service
            [ -f .env ] || touch .env

            # ── KILL LEGACY PM2 ROUTE + PROCESS ─────────────────────────
            # Traefik file provider at /etc/traefik/dynamic/video-pm2.yml sends
            # clipgen.ru to 172.17.0.1:3000 (host-level pm2 process with old code).
            # Remove it so our Docker container's labels win.
            TRAEFIK_ID=$(docker ps --filter "name=traefik" --format "{{.ID}}" | head -1)
            if [ -n "$TRAEFIK_ID" ]; then
              TRAEFIK_DYNAMIC_MOUNT=$(docker inspect "$TRAEFIK_ID" --format '{{range .Mounts}}{{if eq .Destination "/etc/traefik/dynamic"}}{{.Source}}{{end}}{{end}}')
              if [ -n "$TRAEFIK_DYNAMIC_MOUNT" ] && [ -f "$TRAEFIK_DYNAMIC_MOUNT/video-pm2.yml" ]; then
                echo "Removing legacy $TRAEFIK_DYNAMIC_MOUNT/video-pm2.yml"
                rm -f "$TRAEFIK_DYNAMIC_MOUNT/video-pm2.yml"
              else
                # Fallback: remove directly inside container
                docker exec "$TRAEFIK_ID" sh -c 'rm -f /etc/traefik/dynamic/video-pm2.yml' || true
              fi
            fi

            # Kill any pm2 process on the host that listens on :3000
            if command -v pm2 >/dev/null 2>&1; then
              echo "=== PM2 list ==="
              pm2 list || true
              pm2 delete all 2>/dev/null || true
              pm2 kill 2>/dev/null || true
            fi
            # Nuke anything still on :3000
            fuser -k 3000/tcp 2>/dev/null || true

            # ── REBUILD & UP ────────────────────────────────────────────
            docker compose down --remove-orphans 2>/dev/null || true
            docker images --format "{{.ID}} {{.Repository}}" | grep ai-video-factory | awk "{print \$1}" | while read iid; do
              docker rmi -f "$iid" 2>/dev/null || true
            done

            docker compose build --no-cache app
            docker compose up -d --force-recreate

            sleep 8
            echo "=== Final containers ==="
            docker ps --format "{{.Names}} {{.Image}} {{.Status}}"

            echo "=== External check ==="
            curl -sI https://clipgen.ru/api/health 2>&1 | head -15 || true

            echo "✅ Deployed at $(date)"
