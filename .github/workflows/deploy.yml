name: Deploy to Beget VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.212.141.8
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            REPO="https://${{ secrets.GH_TOKEN_DEPLOY }}@github.com/seorezult-hub/ai-video-factory.git"

            if [ ! -d /opt/video-service/.git ]; then
              rm -rf /opt/video-service
              git clone "$REPO" /opt/video-service
            else
              cd /opt/video-service
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/video-service
            [ -f .env ] || touch .env

            TRAEFIK_ID=$(docker ps --filter "name=traefik" --format "{{.ID}}" | head -1)
            if [ -n "$TRAEFIK_ID" ]; then
              echo "=== Traefik container configs ==="
              docker inspect "$TRAEFIK_ID" --format '{{range .Args}}{{println .}}{{end}}' || true
              echo "=== Traefik file providers ==="
              docker exec "$TRAEFIK_ID" sh -c 'ls -la /etc/traefik/ 2>/dev/null || true'
              docker exec "$TRAEFIK_ID" sh -c 'find /etc/traefik -type f 2>/dev/null | xargs -I F sh -c "echo --- F ---; cat F"' 2>/dev/null || true
              echo "=== Traefik mounted volumes ==="
              docker inspect "$TRAEFIK_ID" --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}' || true
            fi

            docker compose down --remove-orphans 2>/dev/null || true
            docker images --format "{{.ID}} {{.Repository}}" | grep ai-video-factory | awk "{print \$1}" | while read iid; do
              docker rmi -f "$iid" 2>/dev/null || true
            done

            docker compose build --no-cache app
            docker compose up -d --force-recreate

            sleep 8
            echo "=== Running containers ==="
            docker ps --format "{{.Names}} {{.Image}} {{.Status}}"

            if [ -n "$TRAEFIK_ID" ]; then
              echo "=== curl from traefik container to app ==="
              docker exec "$TRAEFIK_ID" sh -c 'wget -qO- -S --header="Host: clipgen.ru" http://ai-video-factory:3000/api/health 2>&1 | head -25' || true
            fi

            echo "✅ Deployed at $(date)"
