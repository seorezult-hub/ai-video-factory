name: Deploy to Beget VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.212.141.8
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            REPO="https://${{ secrets.GH_TOKEN_DEPLOY }}@github.com/seorezult-hub/ai-video-factory.git"

            if [ ! -d /opt/video-service/.git ]; then
              rm -rf /opt/video-service
              git clone "$REPO" /opt/video-service
            else
              cd /opt/video-service
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/video-service

            # Ensure .env exists (create empty if missing)
            if [ ! -f .env ]; then
              touch .env
              echo "⚠️  .env was missing — created empty. Add real secrets to /opt/video-service/.env"
            fi

            # Nuke any stale containers that might still claim clipgen.ru on Traefik
            echo "=== Stale containers with clipgen.ru label ==="
            docker ps -a --filter "label=traefik.http.routers.video-factory.rule=Host(\`clipgen.ru\`)" --format "{{.ID}} {{.Names}} {{.Image}}" || true
            for cid in $(docker ps -a --format "{{.ID}} {{.Names}}" | grep -Ei "video|clipgen|next" | awk '{print $1}'); do
              echo "Stopping/removing $cid"
              docker stop "$cid" 2>/dev/null || true
              docker rm -f "$cid" 2>/dev/null || true
            done

            docker compose down --remove-orphans || true
            docker compose build app
            docker compose up -d --force-recreate

            sleep 5
            echo "=== Running containers ==="
            docker ps --format "{{.Names}} {{.Image}} {{.Status}}"
            echo "=== Health check ==="
            docker compose ps
            echo "✅ Deployed at $(date)"
