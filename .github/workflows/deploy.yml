name: Deploy to Beget VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.212.141.8
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            REPO="https://${{ secrets.GH_TOKEN_DEPLOY }}@github.com/seorezult-hub/ai-video-factory.git"

            if [ ! -d /opt/video-service/.git ]; then
              rm -rf /opt/video-service
              git clone "$REPO" /opt/video-service
            else
              cd /opt/video-service
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/video-service
            [ -f .env ] || touch .env

            echo "=== Who else is claiming clipgen.ru on Traefik? ==="
            # Traefik API (if exposed on localhost)
            curl -s http://localhost:8080/api/http/routers 2>/dev/null | python3 -c "
import json,sys
try:
  data = json.load(sys.stdin)
  for r in data:
    rule = r.get('rule','')
    if 'clipgen' in rule.lower():
      print(f\"  router: {r.get('name')}, service: {r.get('service')}, rule: {rule}, provider: {r.get('provider')}\")
except: pass
" || echo "Traefik API not on :8080"

            # Inspect traefik container for file providers
            TRAEFIK_ID=$(docker ps --filter "name=traefik" --format "{{.ID}}" | head -1)
            if [ -n "$TRAEFIK_ID" ]; then
              echo "=== Traefik file providers ==="
              docker exec "$TRAEFIK_ID" sh -c "ls -la /etc/traefik/ 2>/dev/null; find /etc/traefik -name '*.yml' -o -name '*.toml' 2>/dev/null | head -5 | xargs -I {} sh -c 'echo --- {} ---; cat {}' 2>/dev/null" || true
              echo "=== Traefik command args ==="
              docker inspect "$TRAEFIK_ID" --format '{{range .Args}}{{println .}}{{end}}' | grep -i "provider\|file"
            fi

            # Nuke and rebuild
            docker compose down --remove-orphans 2>/dev/null || true
            docker images --format "{{.ID}} {{.Repository}}" | grep ai-video-factory | awk '{print $1}' | while read iid; do
              docker rmi -f "$iid" 2>/dev/null || true
            done

            docker compose build --no-cache app
            docker compose up -d --force-recreate

            sleep 8

            # Test from INSIDE traefik network — bypass DNS
            if [ -n "$TRAEFIK_ID" ]; then
              echo "=== curl from traefik container to app ==="
              docker exec "$TRAEFIK_ID" sh -c "wget -qO- -S --header='Host: clipgen.ru' http://ai-video-factory:3000/api/health 2>&1 | head -30" || true
            fi

            echo "=== External curl to clipgen.ru ==="
            curl -sI https://clipgen.ru/api/health 2>&1 | head -15 || true

            echo "✅ Deployed at $(date)"
