name: Deploy to Beget VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.212.141.8
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            REPO="https://${{ secrets.GH_TOKEN_DEPLOY }}@github.com/seorezult-hub/ai-video-factory.git"

            if [ ! -d /opt/video-service/.git ]; then
              rm -rf /opt/video-service
              git clone "$REPO" /opt/video-service
            else
              cd /opt/video-service
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/video-service
            git clean -fdx --exclude=.env --exclude=.env.local
            [ -f .env ] || touch .env

            # ── BUILD (сайт работает пока собираем) ─────────────────────
            docker compose build app

            # ── ПЕРЕКЛЮЧАЕМ (даунтайм < 2 сек) ─────────────────────────
            docker compose up -d --no-deps --force-recreate app

            # ── TRAEFIK FILE PROVIDER ────────────────────────────────────
            cp /opt/video-service/traefik/clipgen.yml /opt/beget/n8n/traefik_data/dynamic/clipgen.yml

            # ── ЧИСТИМ СТАРЫЕ ОБРАЗЫ ─────────────────────────────────────
            docker image prune -f

            sleep 10
            echo "=== Status ==="
            docker ps --format "{{.Names}} {{.Status}}"
            echo "=== Health ==="
            curl -s https://clipgen.ru/api/health || true
            echo ""
            echo "✅ Deployed at $(date)"
