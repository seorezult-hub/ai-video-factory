name: Deploy to Beget VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 155.212.141.8
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            REPO="https://${{ secrets.GH_TOKEN_DEPLOY }}@github.com/seorezult-hub/ai-video-factory.git"

            if [ ! -d /opt/video-service/.git ]; then
              rm -rf /opt/video-service
              git clone "$REPO" /opt/video-service
            else
              cd /opt/video-service
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd /opt/video-service

            if [ ! -f .env ]; then
              touch .env
              echo "⚠️  .env was missing — created empty. Add real secrets to /opt/video-service/.env"
            fi

            echo "=== ALL containers BEFORE cleanup ==="
            docker ps -a --format "{{.ID}} | {{.Names}} | {{.Image}} | {{.Status}}"
            echo ""

            # Find ANY container that has clipgen.ru label OR uses ai-video-factory image
            echo "=== Killing any container claiming clipgen.ru or using ai-video-factory image ==="
            STALE=$(docker ps -a --format "{{.ID}}|{{.Names}}|{{.Image}}|{{.Labels}}" | \
              grep -Ei "clipgen\.ru|ai-video-factory|video-service|next-app" || true)
            if [ -n "$STALE" ]; then
              echo "$STALE"
              echo "$STALE" | awk -F'|' '{print $1}' | while read cid; do
                echo "Killing $cid"
                docker stop "$cid" 2>/dev/null || true
                docker rm -f "$cid" 2>/dev/null || true
              done
            fi

            # Also cleanup by compose project
            docker compose -p video-service down --remove-orphans 2>/dev/null || true
            docker compose down --remove-orphans 2>/dev/null || true

            docker compose build app
            docker compose up -d --force-recreate

            sleep 5
            echo ""
            echo "=== ALL containers AFTER deploy ==="
            docker ps -a --format "{{.ID}} | {{.Names}} | {{.Image}} | {{.Status}}"
            echo ""
            echo "=== Traefik routers ==="
            docker inspect $(docker ps --format "{{.ID}}") 2>/dev/null | grep -i "clipgen.ru" || true
            echo "✅ Deployed at $(date)"
