services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-video-factory:latest
    container_name: ai-video-factory
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - TRUST_PROXY=1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - /tmp:/tmp
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.video-factory.rule=Host(`clipgen.ru`)"
      - "traefik.http.routers.video-factory.entrypoints=websecure"
      - "traefik.http.routers.video-factory.tls=true"
      - "traefik.http.routers.video-factory.tls.certresolver=mytlschallenge"
      - "traefik.http.services.video-factory.loadbalancer.server.port=3000"
    networks:
      - traefik

networks:
  traefik:
    external: true
