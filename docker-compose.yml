services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-video-factory:latest
    container_name: ai-video-factory
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - TRUST_PROXY=1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0efbef2e1d2b0e9cf8bb7856b94b77aee8dfd6fa9754a6d68ccad58ba4d37d93}
    volumes:
      - /tmp:/tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.video-factory.rule=Host(`clipgen.ru`)"
      - "traefik.http.routers.video-factory.tls=true"
      - "traefik.http.routers.video-factory.tls.certresolver=letsencrypt"
      - "traefik.http.services.video-factory.loadbalancer.server.port=3000"
    networks:
      - traefik

networks:
  traefik:
    external: true
